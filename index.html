        }
        .box a {

            text-decoration: none;
            color: #333;
        }
        .box a img {
            width: 150px;
            height: 150px;
            margin-bottom: 10px;
        }

        .box a img:hover {
			transform: scale(1.2);
			transition: 0.5s;
		}

        @media (max-width: 999px) {
            .container {
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                grid-gap: 10px;
                max-width: 800px;
            }
            .box a img {
                width: 300px;
                height: 300px;
            }
            span{
	            font-size: 27px
            }
        }
	</style>
