<script>

	var tab;
	function openTab(evt, tabName) {
		var i, tabcontent;
		tabcontent = document.getElementsByClassName("tabcontent");
		for (i = 0; i < tabcontent.length; i++) {
			tabcontent[i].style.display = "none";
		}

		tab = document.getElementsByClassName("tab");
		for (i = 0; i < tab.length; i++) {
			tab[i].className = tab[i].className.replace(" active", "");
		}

		document.getElementById(tabName).style.display = "block";
		evt.currentTarget.className += " active";
	}


	let Map = new ol.Map({
		target: "map",
		layers: [Satellite],
		view: new ol.View({
			center: [14134400.402396256,4515846.4924247805],
			zoom: 18,
			minZoom: 5,
			maxZoom: 19,
		})
	})


	let draw;
	let source = new ol.source.Vector({wrapX: false});
	let vector = new ol.layer.Vector({
		source: source
	});
	Map.addLayer(vector);



	let typeSelect = 'Circle';
	var addlists = [];

	function addInteraction() {
		let value = typeSelect;
		if (value !== 'None') {
			let geometryFunction;
			if (value === 'Circle') {
				geometryFunction = ol.interaction.Draw.createRegularPolygon();
			} else if (value === 'Square') {
				geometryFunction = ol.interaction.Draw.createRegularPolygon(4);
			}
			draw = new ol.interaction.Draw({
				source: source,
				type: (value === 'Square') ? 'Circle' : value,
				geometryFunction: geometryFunction
			});
			Map.addInteraction(draw);

			draw.on('drawend', function(evt){
				let area = evt.feature.getGeometry().getArea();
				if (area / 1000000 <= 2){
					addlists = [];
					let format = new ol.format.WKT();
					let wktRepresenation = format.writeGeometry(evt.feature.getGeometry());
					let bbox = evt.feature.getGeometry().getExtent().toString();
					// let box = "BOX(" + bbox.replace("[", "").replace("]", "") + ")";
					$.ajax({
						url: "https://api.vworld.kr/req/data?",
						type: "get",
						dataType: "jsonp",
						data: {
							service: "data",
							version: "2.0",
							request: "GetFeature",
							data: "LP_PA_CBND_BUBUN",
							key: apikey,
							format: "json",
							size: 80,
							page: "1",
							geomFilter: wktRepresenation,
							crs: "EPSG:900913"
						},
						success: function (data) {
							console.log(data)
							data.response.result.featureCollection.features.forEach(function (item){
								let coordinates = item.geometry.coordinates[0][0];
								let polygon = new ol.geom.Polygon([coordinates]);
								let extent = polygon.getExtent();
								let center = ol.extent.getCenter(extent);
								addlists.push({jibun: item.properties.addr, pnu: item.properties.pnu, xy: center})
							})
						},
						complete: function (response) {
							source.clear();
							getPageItems(1);
						},
					})
				}else{
					alert("2㎢ 이하로 선택해주세요.")
					setInterval(function(){
						source.clear();
					}, 500)
				}
			});

		}
	}
	addInteraction();

	var itemsPerPage = 10;

	function getPageItems(pageNum){
		$("#addrList").css("display", "block")
		$("#addrList ul").empty();
		$("#addrPapeing").empty();
		var start = (pageNum - 1) * itemsPerPage;
		var end = start + itemsPerPage;
		addlists.slice(start, end).forEach(function (item){
			$("#addrList ul").append("<li data-pnu='"+ item.pnu +"' data-xy='"+item.xy+"' onclick='selAddr(this)'>"+item.jibun+"</li>")
		})
		for (var i = 1; i <= Math.ceil(addlists.length / itemsPerPage); i++){
			$("#addrPapeing").append("<button onclick='getPageItems("+i+")'>"+i+"</button>")
		}
	}

	function selAddr(obj){
		let xy = $(obj).data("xy");
		let pnu = $(obj).data("pnu");
		let center = xy.split(",");
		//center 좌표에 마커 생성
		// center를 ol point로 변환
		let point = new ol.geom.Point(center);
		// point 기반으로 마커 생성
		let marker = new ol.Feature({
			geometry: point,
		});
		vector.getSource().clear();
		marker.setStyle(new ol.style.Style({
			image: new ol.style.Icon({
				src: "https://map.vworld.kr/images/ol3/marker_blue.png",
				anchor: [0.5, 1],
				scale: 1
			})
		}));
		//vector 레이어에 marker 추가
		vector.getSource().addFeature(marker);
		// 마커 스타일 지정
		Map.getView().setCenter(center);
		Map.getView().setZoom(19);

		$.ajax({
			url: "http://apis.data.go.kr/1611000/nsdi/BuildingAgeService/attr/getBuildingAge?",
			type: "get",
			data: {
				serviceKey: "aCdaU+NvJ5bk1HWXu5BRZWjG6uMcj9Wz9UUBoruCaG9ZjBIcQ0Sd7cS0zQmiqK7UV6rfB0LgRSlRO2LcXWpCfA==",
				pageNo: "1",
				numOfRows: "10",
				pnu: pnu,
				format: "json"
			},
			success: function (agedata) {
				$("#buildingInfoContentBody").empty();
				if (agedata.buildingAges.field[0] === undefined) {
					$("#buildingInfoContentBody").append("건축물이 없는 지역입니다.")
				}else{
					console.log(agedata.buildingAges.field[0])
				}
			},
		})
	}
</script>
