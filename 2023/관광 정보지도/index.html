<!DOCTYPE html>
<html lang="en">
<head>
	<title>Title</title>
	<meta charset="UTF-8">
	<script src="https://code.jquery.com/jquery-2.2.3.min.js"></script>
	<script src="https://code.jquery.com/ui/1.13.1/jquery-ui.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.15.5/xlsx.full.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/ol@v7.1.0/dist/ol.js"></script>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.1.0/ol.css">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/5.1.6/turf.js"></script>
	<link rel="stylesheet" href="css/index.css">
	<script src="https://cdn.jsdelivr.net/npm/ol-ext/dist/ol-ext.min.js"></script>

	<style>
        @font-face {
            font-family: 'TheJamsil5Bold';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2302_01@1.0/TheJamsil5Bold.woff2') format('woff2');
            font-weight: 700;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0;
        }
        #map{
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background: #f5f5f5;
        }
        .menu-container {
            width: 100%;
            position: fixed;
            bottom: 0;
            display: flex;
            flex-wrap: nowrap;
            overflow-x: scroll;
            background-color: #FFFFFF;
        }

        .menu-container img {
            width: 115px;
            height: 115px;
            padding: 10px;
            margin: 40px;
            border: 3px solid #4997f6;
            border-radius: 100%;
        }

        #locName{
            position: fixed;
            left: 50%;
            transform: translate(-50%, 0);
            bottom: 250px;
            display: inline-block;
        }
        #locName span{
            display: inline-block;
            padding: 25px;
            color: #4997f6;
            background: #FFFFFF;
            border-radius: 20px;
            font-family: TheJamsil5Bold, sans-serif;
            border: #4997f6 3px solid;
            font-size: 30px;
        }
        #locName:after{
            border-width: 30px 20px;
            left: 50%;
            margin-left: -20px;
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border-style: solid;
            border-color: #4997f6 transparent transparent transparent;
            bottom: -60px;
        }


        .contentMenu {
            position: fixed;
            top: 5px;
            right: 5px;
            display: inline-block;
        }

        .contentMenu .contentSel {
            padding: 16px;
            color: #4997f6;
            font-size: 30px;
            border-radius: 20px;
            border: 1px solid #4997f6;
            width: 180px;
            font-family: TheJamsil5Bold, sans-serif;
            cursor: pointer;
        }

        .contentMenu .contentItems {
            display: none;
            position: absolute;
            padding-left: 10px;
            min-width: 130px;
            z-index: 1;
            text-align: center;
        }

        .contentMenu .contentItems a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            border: 1px solid #4997f6;
            font-family: TheJamsil5Bold , sans-serif;
            font-size: 20px;
        }

        #loading{
            position: fixed;
			width: 30%;
	        left: 50%;
	        transform: translate(-50%, -50%);
			z-index: 9999;
			display: none;
	        top: 50%;
        }

	</style>
</head>
<body>
	<div id="map"></div>
	<div class="contentMenu">
		<button id="contentSel" class="contentSel">관광지</button>
		<div class="contentItems">
			<a href="#" onclick="contentSel(this)" data-id="12">관광지</a>
			<a href="#" onclick="contentSel(this)" data-id="14">문화시설</a>
			<a href="#" onclick="contentSel(this)" data-id="15">행사/공연/축제</a>
			<a href="#" onclick="contentSel(this)" data-id="25">여행코스</a>
			<a href="#" onclick="contentSel(this)" data-id="28">레포츠</a>
			<a href="#" onclick="contentSel(this)" data-id="32">숙박</a>
			<a href="#" onclick="contentSel(this)" data-id="38">쇼핑</a>
			<a href="#" onclick="contentSel(this)" data-id="39">음식점</a>
		</div>
	</div>
	<div id="locName">
		<span id="locSido">경기도</span>
	</div>
	<div class="menu-container" id="menu">
		<div style="flex-shrink: 0; width: 380px"></div>
		<img src="https://www.laiis.go.kr/images/egovframework/img_logo_1100000000.png" alt="서울" data-id=1>
		<img src="https://www.laiis.go.kr/images/egovframework/img_logo_2600000000.png" alt="부산" data-id=2>
		<img src="https://www.laiis.go.kr/images/egovframework/img_logo_2700000000.png" alt="대구" data-id=3>
		<img src="https://www.laiis.go.kr/images/egovframework/img_logo_2800000000.png" alt="인천" data-id=4>
		<img src="https://www.laiis.go.kr/images/egovframework/img_logo_2900000000.png" alt="광주" data-id=5>
		<img src="https://www.laiis.go.kr/images/egovframework/img_logo_3000000000.png" alt="대전" data-id=6>
		<img src="https://www.laiis.go.kr/images/egovframework/img_logo_3100000000.png" alt="울산" data-id=7>
		<img src="https://www.laiis.go.kr/images/egovframework/img_logo_3611000000.png" alt="세종" data-id=8>
		<img src="https://www.laiis.go.kr/images/egovframework/img_logo_4100000000.png" alt="경기" data-id=9>
		<img src="https://www.laiis.go.kr/images/egovframework/img_logo_4200000000.png" alt="강원" data-id=10>
		<img src="https://www.laiis.go.kr/images/egovframework/img_logo_4300000000.png" alt="충북" data-id=11>
		<img src="https://www.laiis.go.kr/images/egovframework/img_logo_4400000000.png" alt="충남" data-id=12>
		<img src="https://www.laiis.go.kr/images/egovframework/img_logo_4500000000.png" alt="전북" data-id=13>
		<img src="https://www.laiis.go.kr/images/egovframework/img_logo_4600000000.png" alt="전남" data-id=14>
		<img src="https://www.laiis.go.kr/images/egovframework/img_logo_4700000000.png" alt="경북" data-id=15>
		<img src="https://www.laiis.go.kr/images/egovframework/img_logo_4800000000.png" alt="경남" data-id=16>
		<img src="https://www.laiis.go.kr/images/egovframework/img_logo_5000000000.png" alt="제주" data-id=17>
		<div style="flex-shrink: 0; width: 380px;"></div>
	</div>

	<img id="loading" src="css/loading.gif"/>

	<script src="../../keys/vworld.js"></script>
	<script>
        let Map = new ol.Map({
            target: "map",
            layers: [Satellite],
            view: new ol.View({
                center: EPSGChg(127.100616, 37.402142),
                zoom: 10,
                minZoom: 5,
                maxZoom: 18,
            })
        })

        function EPSGChg(x, y) {
            return ol.proj.transform([x, y], "EPSG:4326", "EPSG:3857");
        }

        Map.on("movestart", function() {
            $(".contentItems").hide();
		})

        var informationMarker = new ol.layer.Vector({
            source: new ol.source.Vector(),
            name: "informationMarker",
            style: function (feature) {
                return new ol.style.Style({
                    image: new ol.style.Icon(({
                        anchor: [0.5, 10],
                        anchorXUnits: 'fraction',
                        anchorYUnits: 'pixels',
                        src: feature.get("emoji"),
                        scale: 1,
                    })),
                    fill: new ol.style.Fill({
                        color: 'rgba(255, 255, 255, 0.2)'
                    }),
                    stroke: new ol.style.Stroke({
                        color: '#ffcc33',
                        width: 2
                    }),
                });
            }
        });

        Map.addLayer(informationMarker)

    </script>
	<script>

        /**
         * 유니코드를 이모지로 변환
         * @uniemoji 이모지
         * @returns 이모지 임의의 URL 주소
         */
        // 🗽0x1F5FD
        // 🏛0x1F3DB
        // 🎆0x1F386
        // 🛫0x1F6EB
        // 🚴0x1F6B4
        // ⛺0x26FA
        // 🏪0x1F3EA
        // 🍝0x1F35D

        var emojiid;
        window.onload = function() {
	        emojiid = {
                12: String.fromCodePoint(0x1F5FD),
		        14: String.fromCodePoint(0x1F3DB),
		        15: String.fromCodePoint(0x1F386),
		        25: String.fromCodePoint(0x1F6EB),
		        28: String.fromCodePoint(0x1F6B4),
		        32: String.fromCodePoint(0x26FA),
		        38: String.fromCodePoint(0x1F3EA),
		        39: String.fromCodePoint(0x1F35D),
	        }
        }

        function emojiConvert(uniemoji) {
            emoji = emojiid[uniemoji];
            var canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            var ctx = canvas.getContext('2d');
            ctx.font = '64px serif';
            ctx.fillText(emoji, 0, 64);
            return canvas.toDataURL();
        }


        let content = 12;

        function contentSel(a){
            $("#contentSel").text(a.text);
            content = a.getAttribute("data-id");
            dataload();
            $(".contentItems").hide();
        }

        $("#contentSel").click(function() {
            $(".contentItems").toggle();
        });

        function dataload(){
            $.ajax({
                url: "http://apis.data.go.kr/B551011/KorService1/searchKeyword1",
                data: {
                    numOfRows: 100,
                    pageNo: 1,
                    MobileOS: "ETC",
                    MobileApp: "VWORLD",
                    ServiceKey: "aCdaU+NvJ5bk1HWXu5BRZWjG6uMcj9Wz9UUBoruCaG9ZjBIcQ0Sd7cS0zQmiqK7UV6rfB0LgRSlRO2LcXWpCfA==",
                    _type: "json",
                    contentTypeId: content,
                    keyword: $("#locSido").text(),
                },
	            beforeSend: function() {
                    informationMarker.getSource().clear();
                    $("#loading").show();
				},
                success: function(data) {
                    data.response.body.items.item.forEach(function (item){
                        informationMarker.getSource().addFeatures([
                            new ol.Feature({
                                geometry: new ol.geom.Point(EPSGChg(item.mapx, item.mapy)),
                                name: item.title,
                                emoji: emojiConvert(content),
	                            addr: item.addr1
                            })
                        ])
                    });
                },
	            complete: function() {
                    $("#loading").hide();
                }
            });
        };

        $(document).ready(function() {
            var menuContainer = $('#menu');
            var images = menuContainer.find('img');
            var isScrolling;

            var middleImageIndex = Math.floor(images.length / 2);
            var middleImage = images[middleImageIndex];

            var offset = middleImage.offsetLeft - (menuContainer[0].offsetWidth / 2) + (middleImage.offsetWidth / 2);
            menuContainer[0].scrollLeft = offset;

            var altText = middleImage.alt;
            $("#locSido").text(altText);

            menuContainer.on('scroll', function() {
                var middlePosition = menuContainer[0].scrollLeft + (menuContainer[0].clientWidth / 2);
                var middleImage;
                for (var i = 0; i < images.length; i++) {
                    var image = images[i];
                    var imagePosition = image.offsetLeft + (image.offsetWidth / 2);
                    if (imagePosition >= middlePosition) {
                        middleImage = image;
                        break;
                    }
                }
                if (middleImage) {
                    var altText = middleImage.alt;
                    $("#locSido").text(altText);
                }

                window.clearTimeout(isScrolling);
                isScrolling = setTimeout(function() {
                    dataload()
                }, 200);
            });

            $('.menu-container img').click(function() {
                var offset = this.offsetLeft - (menuContainer[0].offsetWidth / 2) + (this.offsetWidth / 2);
                menuContainer.animate({
                    scrollLeft: offset
                }, 150);
            });
        });

	</script>
</body>
</html>
